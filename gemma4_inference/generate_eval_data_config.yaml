# ================================================
# Eval-Only Preprocessing Config (Gemma4)
# Single task + single mode, no train/val/test split,
# few-shot DISABLED regardless of mode flag.
# ================================================

# ---------- Model ----------
# Split tag & chat template are auto-detected from this path
# (qwen / gemma3 / gemma4 substring match → gemma4 stop token <turn|>).
#
# Gemma4 + vLLM 주의: vLLM은 Gemma4ForConditionalGeneration LoRA를 아직 미지원
# (Issue #39246, May 2026 기준 미해결). 그래서 LoRA adapter를 base에 미리 merge한
# 단일 16bit 체크포인트를 base 모델로 로드해야 함.
#
# 워크플로:
#   1) python3 -m scripts.merge_lora_to_base --lora_path <학습 OUTPUT_PATH>
#   2) 아래 model.name을 merged 디렉토리(<lora_path>_merged_16bit)로 변경
#   3) inference.lora_path는 null로 둠
#
# 주석 처리된 base 경로는 사전 학습 직후 base만으로 sanity test할 때만 사용.
model:
  # name: "/app/host/models/gemma4-E4B-it/"   # base only (LoRA 없이 추론)
  name: "/app/train_result/gemma4-e4b_sft_v2_rank8_alpha16_lr0.0001_batch8_ep3_0.05_merged_16bit"

# ---------- Data ----------
# All eval stages (preprocess / vLLM inference / metadata merge) share these paths.
data:
  # 평가 입력 JSONL (metadata lookup source와 반드시 같아야 함 — origin_id 매칭용)
  input_path: "/app/host/datasets/en_ner2ner_500.jsonl"
  # Preprocessing output = vLLM inference input = merge step's HF dataset
  output_path: "/app/pred_data/eval_gemma4_no_fewshot_hf"

# ---------- Inference ----------
inference:
  # vLLM이 생성한 predictions JSONL. merge 단계에서도 이 경로를 읽음.
  predictions_path: "/app/pred_data/vllm_predictions_gemma4.jsonl"

  # ⚠️ Gemma4 + vLLM에서는 LoRA를 별도 로드하지 않고 model.name이 가리키는 merged
  # 체크포인트로 통째로 로드. 이 값은 항상 null로 유지.
  # (vLLM Issue #39246 — Gemma4ForConditionalGeneration LoRA 미지원)
  # Llama/Qwen처럼 LoRA가 정식 지원되는 모델군에서는 이 값을 활성화 가능.
  lora_path: null

  # max_lora_rank는 lora_path=null이면 사용되지 않으나, 향후 LoRA 활성 시 학습
  # rank와 일치해야 함 (sft_gemma4.py의 RANK=8).
  max_lora_rank: 8
  # vLLM GPU 메모리 점유율. 다른 프로세스와 공유 시 낮추기.
  gpu_memory_utilization: 0.9

# ---------- Merge ----------
merge:
  output_path: "/app/pred_data/parsed_output_with_metadata_gemma4.jsonl"
  # Eval 시 ground_truth 포함 여부 (False면 pure inference 모드)
  eval_mode: true

# ---------- Task & Mode (SINGLE selection) ----------
# task:  NER_NER / NER_BEE
task: "NER_NER"

# mode:  system_only / full_detailed / full_summary / no_fewshot / reasoning
# NOTE: few-shot is skipped regardless of this mode's few_shot flag.
# If the trained model was trained WITH few-shot (full_*), expect format mismatch.
# Recommended: "no_fewshot" or "system_only".
mode: "no_fewshot"

# ---------- Token budget ----------
training_max_length: 8192

# ---------- Chunking ----------
generation:
  num_proc: 8
  chunk_thresholds: [12, 10, 8, 6, 4]

# ---------- Negative relations ----------
negatives:
  include_no_relationship: true

# ---------- Prompt template ----------
# 메인 학습과 동일한 프롬프트 템플릿 (false 정규화 등 v2 수정 반영).
prompt:
  yaml_path: "./sft_data_generation_prompts_edited.yaml"

# ---------- Misc ----------
seed: 42
