# ================================================
# Train Data Generation Config
# ================================================

# ---------- Model ----------
model:
  # name: "/app/models/qwen3.5-9b/"
    name: "/app/host/models/gemma4-E4B-it/"
# ---------- Data ----------
data:
  input_path: "/app/host/datasets/sllm_all_ready.jsonl"
  output_path: "/app/pred_data/sllm_ready_generated_prompts_gemma4.json"

training_max_length: 8192 

generation:
  num_proc: 8
  batch_size: 1000
  chunk_thresholds: [12, 10, 8, 6, 4]
  # 30만 → 10만 (학습 속도 확보 + diversity sampling으로 품질 유지)
  # 실제 total은 target_train / 0.7 ≈ 142,857로 자동 환산됨.
  target_total_training_samples: 100000

  # ---------- Diversity-aware quota sampling (PHASE 3) ----------
  # 3-pass greedy: Priority 보존 → Coverage floor 충족 → Novelty/head-cap fill
  # enable=false면 legacy random origin sampling으로 폴백.
  diversity:
    enable: true

    # Dynamic rare 판정: corpus에 X chunk 미만 또는 Y origin 미만 지원시 rare로 승격
    dynamic_rare_chunk_threshold: 100
    dynamic_rare_origin_threshold: 30

    # Relation 노출 floor: 각 non-head relation은 최소 N chunk 보장
    # floor = clip(relation_floor_ratio * raw_exposure, min, max)
    relation_floor_min: 20
    relation_floor_max: 100
    relation_floor_ratio: 0.25

    # Entity-group pair 노출 floor: subj_group>obj_group 조합별 최소 chunk
    group_pair_floor_min: 10
    group_pair_floor_max: 60
    group_pair_floor_ratio: 0.15

    # Head relation share soft cap (chunk 점유율 상한, 초과분은 penalty로 억제)
    head_caps_ner_ner:
      NO_RELATION: 0.35
      used_by: 0.14
      same_entity: 0.10
    head_caps_ner_bee:
      __bee_false__: 0.70
  
# ---------- Prompt ----------
prompt:
  yaml_path: "./preprocessing/sft_data_generation_prompts_edited.yaml"

# ---------- Negative Sampling Settings ----------
negatives:
  include_no_relationship: True
  # If True, ALL orphan pairs become "no_relationship"

# ---------- Fewshot Settings ----------
fewshot:
  # sample_size: 1
  seed: 42
  min_pairs: 8
  max_pairs: 12
  prioritize_rare: True

# ---------- Tasks ----------
# NER_BEE_TRUE_ONLY는 eval 파이프라인에서 미지원 → 학습에서도 제외하여 정합성 확보.
# 필요 시 eval(generate_eval_data.py) 지원부터 먼저 추가한 뒤 재활성화.
tasks:
  - "NER_NER"
  - "NER_BEE"

# ---------- Modes ----------
modes:
  system_only:
    enable_description: false
    few_shot: false
    summarize_description: false
    reasoning: false

  full_detailed:
    enable_description: true
    few_shot: true
    summarize_description: false
    reasoning: false

  full_summary:
    enable_description: true
    few_shot: true
    summarize_description: true
    reasoning: false

  no_fewshot:
    enable_description: true
    few_shot: false
    summarize_description: false
    reasoning: false

  reasoning:
    enable_description: false
    few_shot: false
    summarize_description: false
    reasoning: true

# ---------- Mode Ratios ----------
mode_ratios:
  system_only: 0.2
  full: 0.6
  full_detailed_ratio: 0.7
  no_fewshot: 0.2
  reasoning: 0.0