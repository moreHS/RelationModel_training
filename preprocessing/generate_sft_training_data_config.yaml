# ================================================
# Train Data Generation Config
# ================================================

# ---------- Model ----------
model:
  # name: "/app/models/qwen3.5-9b/"
    name: "/app/host/models/gemma4-E4B-it/"
# ---------- Data ----------
data:
  input_path: "/app/host/datasets/sllm_all_ready.jsonl"
  # _v2: diversity-aware sampling + 10л§Ң target + C1~M5 мҲҳм • л°ҳмҳҒ лІ„м „.
  # кё°мЎҙ prompts_gemma4.json/_hf_datasetмқҖ кұҙл“ңлҰ¬м§Җ м•Ҡкі  лі‘л ¬ мғқм„ұ.
  output_path: "/app/pred_data/sllm_ready_generated_prompts_gemma4_v2.json"

training_max_length: 8192 

generation:
  num_proc: 8
  batch_size: 1000
  chunk_thresholds: [12, 10, 8, 6, 4]
  # 30л§Ң вҶ’ 10л§Ң (н•ҷмҠө мҶҚлҸ„ нҷ•ліҙ + diversity samplingмңјлЎң н’Ҳм§Ҳ мң м§Җ)
  # мӢӨм ң totalмқҖ target_train / 0.7 вүҲ 142,857лЎң мһҗлҸҷ нҷҳмӮ°лҗЁ.
  target_total_training_samples: 100000

  # ---------- Diversity-aware quota sampling (PHASE 3) ----------
  # 3-pass greedy: Priority ліҙмЎҙ вҶ’ Coverage floor м¶©мЎұ вҶ’ Novelty/head-cap fill
  # enable=falseл©ҙ legacy random origin samplingмңјлЎң нҸҙл°ұ.
  diversity:
    enable: true

    # Dynamic rare нҢҗм •: corpusм—җ X chunk лҜёл§Ң лҳҗлҠ” Y origin лҜёл§Ң м§ҖмӣҗмӢң rareлЎң мҠ№кІ©
    dynamic_rare_chunk_threshold: 100
    dynamic_rare_origin_threshold: 30

    # Relation л…ём¶ң floor: к°Ғ non-head relationмқҖ мөңмҶҢ N chunk ліҙмһҘ
    # floor = clip(relation_floor_ratio * raw_exposure, min, max)
    relation_floor_min: 20
    relation_floor_max: 100
    relation_floor_ratio: 0.25

    # Entity-group pair л…ём¶ң floor: subj_group>obj_group мЎ°н•©лі„ мөңмҶҢ chunk
    group_pair_floor_min: 10
    group_pair_floor_max: 60
    group_pair_floor_ratio: 0.15

    # Head relation share soft cap (chunk м җмң мңЁ мғҒн•ң, мҙҲкіјл¶„мқҖ penaltyлЎң м–өм ң)
    head_caps_ner_ner:
      NO_RELATION: 0.35
      used_by: 0.14
      same_entity: 0.10
    head_caps_ner_bee:
      __bee_false__: 0.70
  
# ---------- Prompt ----------
prompt:
  yaml_path: "./preprocessing/sft_data_generation_prompts_edited.yaml"

# ---------- Negative Sampling Settings ----------
negatives:
  include_no_relationship: True
  # If True, ALL orphan pairs become "no_relationship"

# ---------- Fewshot Settings ----------
fewshot:
  # sample_size: 1
  seed: 42
  min_pairs: 8
  max_pairs: 12
  prioritize_rare: True

# ---------- Tasks ----------
# NER_BEE_TRUE_ONLYлҠ” eval нҢҢмқҙн”„лқјмқём—җм„ң лҜём§Җмӣҗ вҶ’ н•ҷмҠөм—җм„ңлҸ„ м ңмҷён•ҳм—¬ м •н•©м„ұ нҷ•ліҙ.
# н•„мҡ” мӢң eval(generate_eval_data.py) м§Җмӣҗл¶Җн„° лЁјм Җ м¶”к°Җн•ң л’Ө мһ¬нҷңм„ұнҷ”.
tasks:
  - "NER_NER"
  - "NER_BEE"

# ---------- Modes ----------
modes:
  system_only:
    enable_description: false
    few_shot: false
    summarize_description: false
    reasoning: false

  full_detailed:
    enable_description: true
    few_shot: true
    summarize_description: false
    reasoning: false

  full_summary:
    enable_description: true
    few_shot: true
    summarize_description: true
    reasoning: false

  no_fewshot:
    enable_description: true
    few_shot: false
    summarize_description: false
    reasoning: false

  reasoning:
    enable_description: false
    few_shot: false
    summarize_description: false
    reasoning: true

# ---------- Mode Ratios ----------
mode_ratios:
  system_only: 0.2
  full: 0.6
  full_detailed_ratio: 0.7
  no_fewshot: 0.2
  reasoning: 0.0