# ================================================
# Gold Data Generation Config (мҲҳмһ‘м—… кІҖмҰқ ground-truth м „мҡ©)
# ================================================
# мӢӨн–ү:
#   python3 -m preprocessing.generate_sft_training_data_latest \
#       --config preprocessing/generate_sft_training_data_config_gold.yaml
#
# л©”мқё н•ҷмҠө configмҷҖмқҳ м°Ёмқҙ:
#   1) м—¬лҹ¬ jsonl нҢҢмқј лі‘н•© (data.input_paths)
#   2) origin_id prefix "gold_" лЎң л©”мқёкіј л„Өмһ„мҠӨнҺҳмқҙмҠӨ л¶„лҰ¬
#   3) PHASE 3 diversity sampling л№„нҷңм„ұ + quota м ңкұ° вҶ’ м „мІҙ ліҙмЎҙ
#   4) split.mode = train_only вҶ’ нҸүк°Җмҡ© holdout м—ҶмқҢ (gold м–‘ < 3k)
#   5) н•ҷмҠө мӢң interleave_datasetsлЎң p_gold=0.10 нҳјн•© мҳҲм •
# ================================================

# ---------- Model ----------
model:
  name: "/app/host/models/gemma4-E4B-it/"

# ---------- Data ----------
data:
  # л‘җ gold нҢҢмқјмқ„ мҲңм°Ё mergeн•ҙм„ң лЎңл“ң (loaderк°Җ input_paths лҰ¬мҠӨнҠё м§Җмӣҗ)
  input_paths:
    - "/app/host/datasets/gold/ko_ner2ner_900.jsonl"
    - "/app/host/datasets/gold/ko_ner2bee_1500_all.jsonl"
  # кё°мЎҙ main _v2 datasetкіј м¶©лҸҢ м—ҶлҸ„лЎқ лі„лҸ„ кІҪлЎң
  output_path: "/app/pred_data/sllm_ready_generated_prompts_gemma4_gold_v2.json"

# Gold origin_idлҠ” "gold_<мӣҗліёid>" лЎң prefix л¶Җм—¬.
# mainмқҳ split_ids_map / few-shot leakage guardмҷҖ м ҲлҢҖ м¶©лҸҢ м•Ҳ н•ҳлҸ„лЎқ.
gold_origin_id_prefix: "gold_"

# м „л¶Җ train split (gold м–‘мқҙ мһ‘м•„ val/test лӮҙл¶Җ л¶„н•  л¶Ҳк°Җ)
split:
  mode: "train_only"

training_max_length: 8192

generation:
  num_proc: 8
  batch_size: 1000
  chunk_thresholds: [12, 10, 8, 6, 4]
  # target_total_training_samples м ңкұ° вҶ’ PHASE 3 м „мІҙ мҠӨнӮө (лӘЁл“  gold chunk ліҙмЎҙ)
  # target_total_training_samples: null

  diversity:
    # GoldлҠ” мӣҗліё нҖ„лҰ¬нӢ°к°Җ лҶ’м•„ diversity sampling л¶Ҳн•„мҡ” вҶ’ м „л¶Җ keep
    enable: false

# ---------- Prompt ----------
prompt:
  yaml_path: "./preprocessing/sft_data_generation_prompts_edited.yaml"

# ---------- Negative Sampling Settings ----------
negatives:
  include_no_relationship: True

# ---------- Fewshot Settings ----------
fewshot:
  seed: 42
  min_pairs: 8
  max_pairs: 12
  prioritize_rare: True
  # gold_hf_dataset_pathлҠ” self-referenceлқј лҜём„Өм • (goldк°Җ мһҗкё° мһҗмӢ мқ„ poolлЎң м“ё мқҙмң  м—ҶмқҢ)

# ---------- Tasks ----------
tasks:
  - "NER_NER"
  - "NER_BEE"

# ---------- Modes ----------
modes:
  system_only:
    enable_description: false
    few_shot: false
    summarize_description: false
    reasoning: false

  full_detailed:
    enable_description: true
    few_shot: true
    summarize_description: false
    reasoning: false

  full_summary:
    enable_description: true
    few_shot: true
    summarize_description: true
    reasoning: false

  no_fewshot:
    enable_description: true
    few_shot: false
    summarize_description: false
    reasoning: false

  reasoning:
    enable_description: false
    few_shot: false
    summarize_description: false
    reasoning: true

# ---------- Mode Ratios ----------
mode_ratios:
  system_only: 0.2
  full: 0.6
  full_detailed_ratio: 0.7
  no_fewshot: 0.2
  reasoning: 0.0
